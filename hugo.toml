# Hugo config — AI Agent Articles
# Минималистичный публичный сайт статей. Задел на двуязычность (ru сейчас, en скрыт до перевода).

baseURL = "https://dim-s.github.io/ai-agent-articles/"
defaultContentLanguage = "ru"
enableEmoji = true
enableRobotsTXT = true

# Переезд на свой домен позже = сменить baseURL (одна строка) + пересборка. CI для GitHub
# Pages подставляет актуальный base_url автоматически, так что URL-структура переносима.

[params]
  author = "Дмитрий Зайцев"
  authorLatin = "Dmitrii Zaitsev"
  authorUrl = "https://dim-s.github.io/ai-agent-articles/"
  license = "CC BY 4.0"
  licenseUrl = "https://creativecommons.org/licenses/by/4.0/"
  # — визитка автора (на главной) —
  authorRole = "Инженер-исследователь · автономные ИИ-агенты, R&D"
  bio = "15 лет в IT, по складу инженер-исследователь. Последнее время плотно занят автономными ИИ-агентами: как их собрать, настроить и довести до того, чтобы они работали сами, без постоянного присмотра. Про это и пишу. Подход у меня скорее исследовательский - гипотеза, прототип, проверка на живой задаче, а не теория ради теории. Ещё мне интересно, как модели держат характер и отыгрывают роль, и как с этим жить на локальных моделях, у себя. Это пока больше исследовательский интерес, чем что-то законченное."
  bioTags = ["элегантная простота", "сборка из кубиков", "суверенитет", "спокойствие"]
  github = "https://github.com/dim-s"
  email = "d.zayceff@gmail.com"

[languages]
  [languages.ru]
    label = "Русский"
    locale = "ru"
    contentDir = "content/ru"
    weight = 1
    title = "Статьи об ИИ-агентах"
    [languages.ru.params]
      tagline = "Заметки о том, как я строю автономных ИИ-агентов - и что из этого выходит"
  [languages.en]
    label = "English"
    locale = "en"
    contentDir = "content/en"
    weight = 2
    title = "AI Agent Articles"
    disabled = true   # перевода пока нет — язык заложен структурно, но скрыт
    [languages.en.params]
      tagline = "Notes on building autonomous AI agents for product development"

# /llms.txt — машиночитаемая карта сайта для LLM (llmstxt.org), генерится из index.llms.txt
[outputs]
  home = ["HTML", "RSS", "LLMS"]

[outputFormats]
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true        # разрешить инлайн-HTML/SVG в статьях
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[taxonomies]
  tag = "tags"
