<svg width="100%" viewBox="0 0 1060 590" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
<title>Архитектура dmitry-manager: конвергентные слои + дивергентная ветка</title>
<desc>Вся маршрутизация идёт внутри сессионного режима auto-dmitry-manager — это оркестратор: задаёт полки различителя, batch к владельцу, триггер-переключатель (когда звать мечтателя) и креативную ось. Владелец стоит НАД режимом. КОНВЕРГЕНТНАЯ половина: различитель раскладывает развилку на полки — мелочь исполнитель решает сам, тактическое обратимое уходит в дешёвый движок dmitry-engine, план и готовое — в менеджер dmitry-manager; менеджер только советует, подбирает инструмент сканом по типу находки из штата (code-reviewer на баги, dmitry-programmer на инженерный вкус), держит цикл напоминанием «вызови снова» до «чисто» и эскалирует владельцу только незаменимое. ДИВЕРГЕНТНАЯ половина: на творческой развилке руль даёт триггер-переключатель — исполнитель зовёт мечтателя dmitry-dreamer, который не сводит, а раскладывает широкое поле «векторов-желания»; поле идёт владельцу, он узнаёт в нём своё, финальная искра за ним. Конвергентный менеджер мечтателя не инициирует и его дух не судит — это его структурный антагонист.</desc>
<style>
.t{font-size:15px;font-weight:500;}
.ts{font-size:12px;font-weight:400;}
.lab{font-size:12px;font-weight:400;fill:#5F5E5A;}
.cap{font-size:16px;font-weight:500;fill:#2C2C2A;}
.subcap{font-size:12px;font-weight:400;fill:#7A786F;}
</style>
<defs>
<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#888780"/></marker>
<marker id="ahs" markerWidth="9" markerHeight="9" refX="1" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 z" fill="#888780"/></marker>
<marker id="ahp" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7F77DD"/></marker>
<marker id="ahv" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#534AB7"/></marker>
<marker id="ahd" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#E0942A"/></marker>
</defs>

<rect x="8" y="8" width="1044" height="574" rx="16" fill="#FDFCF9" stroke="#E5E3DB" stroke-width="1"/>

<!-- скилл-оркестратор: объемлющая рамка (владелец — над ней) -->
<rect x="22" y="164" width="1026" height="398" rx="12" fill="none" stroke="#AFA9EC" stroke-width="1.3" stroke-dasharray="5 5"/>
<rect x="28" y="146" width="376" height="40" rx="7" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1.2"/>
<text class="t" x="40" y="165" fill="#26215C">auto-dmitry-manager · сессионный режим</text>
<text class="ts" x="40" y="180" fill="#534AB7">оркестратор: полки · batch · переключатель · креатив-ось</text>

<text class="cap" x="36" y="42">Маршрутизация развилки: конвергентные слои + дивергентная ветка</text>
<text class="subcap" x="36" y="62">всё внутри сессионного режима auto-dmitry-manager (оркестратор); менеджер сводит к «чисто» (конвергенция), мечтатель раскладывает поле (дивергенция)</text>

<!-- разделитель двух половин -->
<line x1="856" y1="80" x2="856" y2="560" stroke="#DAD8D0" stroke-width="1.2" stroke-dasharray="3 4"/>
<text class="lab" x="848" y="94" text-anchor="end" fill="#7A786F">← конвергенция: свести</text>
<text class="lab" x="864" y="94" fill="#A6701F">дивергенция: расходиться →</text>

<line x1="430" y1="136" x2="430" y2="190" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
<text class="lab" x="440" y="168">задача · направление</text>

<polyline points="800,360 826,360 826,109 534,109" fill="none" stroke="#7F77DD" stroke-width="1.6" marker-end="url(#ahp)"/>
<text class="lab" x="818" y="200" text-anchor="end" fill="#534AB7">только незаменимое</text>

<line x1="345" y1="250" x2="188" y2="322" stroke="#888780" stroke-width="1.5" marker-start="url(#ahs)" marker-end="url(#ah)"/>
<line x1="430" y1="250" x2="430" y2="322" stroke="#888780" stroke-width="1.5" marker-start="url(#ahs)" marker-end="url(#ah)"/>

<line x1="518" y1="250" x2="643" y2="320" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M702,322 Q748,246 553,233" fill="none" stroke="#534AB7" stroke-width="1.6" marker-end="url(#ahv)"/>

<text class="lab" x="36" y="298">различитель масштаба</text>
<text class="lab" x="92" y="316">мелочь — сам</text>
<text class="lab" x="440" y="300">тактика</text>
<text class="lab" x="500" y="306" fill="#5F5E5A">план · готово</text>
<text class="lab" x="636" y="244" text-anchor="middle" fill="#534AB7">доделать → вызови снова</text>

<line x1="697" y1="398" x2="694" y2="470" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
<text class="lab" x="706" y="432">указывает запустить</text>
<text class="lab" x="706" y="448">скан по типу находки</text>

<!-- дивергентная ветка: исполнитель -> мечтатель (по триггеру-переключателю) -->
<path d="M551,228 Q740,236 884,318" fill="none" stroke="#E0942A" stroke-width="1.7" marker-end="url(#ahd)"/>
<text class="lab" x="690" y="214" fill="#A6701F">творческая развилка /</text>
<text class="lab" x="690" y="230" fill="#A6701F">«за что взяться» →</text>
<text class="lab" x="690" y="290" text-anchor="middle" fill="#A6701F">триггер-переключатель даёт руль</text>

<rect x="330" y="82" width="200" height="54" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1.2"/>
<text class="t" x="430" y="106" text-anchor="middle" fill="#2C2C2A">Владелец</text>
<text class="ts" x="430" y="123" text-anchor="middle" fill="#5F5E5A">видение · вкус · необратимое</text>

<rect x="310" y="192" width="240" height="58" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1.2"/>
<text class="t" x="430" y="217" text-anchor="middle" fill="#2C2C2A">Исполнитель</text>
<text class="ts" x="430" y="234" text-anchor="middle" fill="#5F5E5A">главная сессия — делает работу</text>

<rect x="60" y="324" width="210" height="72" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1.2"/>
<text class="t" x="165" y="354" text-anchor="middle" fill="#2C2C2A">Решает сам</text>
<text class="ts" x="165" y="372" text-anchor="middle" fill="#5F5E5A">обратимо · дёшево · ясно</text>

<rect x="325" y="324" width="210" height="72" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1.2"/>
<text class="t" x="430" y="354" text-anchor="middle" fill="#04342C">dmitry-engine</text>
<text class="ts" x="430" y="372" text-anchor="middle" fill="#0F6E56">выбор + причина · ~1100 ток.</text>

<rect x="590" y="324" width="210" height="72" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1.2"/>
<text class="t" x="695" y="349" text-anchor="middle" fill="#26215C">dmitry-manager</text>
<text class="ts" x="695" y="367" text-anchor="middle" fill="#534AB7">10 линз · гейт · память</text>
<text class="ts" x="695" y="384" text-anchor="middle" fill="#534AB7">советует — не делает</text>

<rect x="560" y="474" width="276" height="62" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1.2"/>
<text class="t" x="698" y="500" text-anchor="middle" fill="#2C2C2A">штат субагентов · скиллов</text>
<text class="ts" x="698" y="518" text-anchor="middle" fill="#5F5E5A">code-reviewer · dmitry-programmer · …</text>

<!-- блок мечтателя (дивергенция) -->
<rect x="884" y="300" width="158" height="86" rx="10" fill="#FBF1DC" stroke="#E0B86A" stroke-width="1.3"/>
<text class="t" x="963" y="324" text-anchor="middle" fill="#7A4A12">dmitry-dreamer</text>
<text class="ts" x="963" y="342" text-anchor="middle" fill="#A6701F">поле желаний · генератор</text>
<text class="ts" x="963" y="359" text-anchor="middle" fill="#A6701F">расходится, не выбирает</text>
<text class="ts" x="963" y="376" text-anchor="middle" fill="#A6701F">искра — за владельцем</text>

<text class="lab" x="963" y="408" text-anchor="middle" fill="#A6701F">поле → владелец узнаёт своё</text>
<text class="lab" x="963" y="424" text-anchor="middle" fill="#A6701F">(recognition, not generation)</text>
<text class="lab" x="963" y="452" text-anchor="middle" fill="#7A786F">менеджер его НЕ зовёт</text>
<text class="lab" x="963" y="468" text-anchor="middle" fill="#7A786F">и дух не судит (антагонист)</text>

<rect x="40" y="456" width="372" height="106" rx="10" fill="#F6F5EF" stroke="#E5E3DB" stroke-width="1"/>
<text class="lab" x="58" y="479" fill="#7A786F">вердикты — куда уходит результат</text>
<circle cx="64" cy="500" r="5" fill="#639922"/>
<text class="ts" x="78" y="504" fill="#5F5E5A">чисто — действуй, отчитайся по сути</text>
<circle cx="64" cy="524" r="5" fill="#888780"/>
<text class="ts" x="78" y="528" fill="#5F5E5A">доделать · запустить — цикл до «чисто»</text>
<circle cx="64" cy="548" r="5" fill="#7F77DD"/>
<text class="ts" x="78" y="552" fill="#5F5E5A">на владельца — только необратимое и вкусовое</text>
</svg>
