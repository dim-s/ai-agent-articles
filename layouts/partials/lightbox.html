{{- /* Лёгкий лайтбокс без зависимостей. Прогрессивное улучшение: без JS ссылка просто открывает картинку. */ -}}
<div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Просмотр изображения">
  <img alt="" id="lightbox-img">
</div>
<script>
(function () {
  var lb = document.getElementById('lightbox'), img = document.getElementById('lightbox-img');
  if (!lb || !img) return;
  function open(src, alt) {
    img.src = src; img.alt = alt || '';
    lb.classList.add('open'); lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    lb.classList.remove('open'); lb.setAttribute('aria-hidden', 'true');
    img.removeAttribute('src'); document.body.style.overflow = '';
  }
  document.addEventListener('click', function (e) {
    var a = e.target.closest('.lightbox-link');
    if (a) {
      e.preventDefault();
      var inner = a.querySelector('img');
      open(a.getAttribute('href'), inner ? inner.getAttribute('alt') : '');
      return;
    }
    if (e.target === lb || e.target === img) close();
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
})();
</script>
